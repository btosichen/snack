<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復古鮮豔貪食蛇</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 全局與重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 鮮豔的亮黃色背景 */
            background-color: #FFDE00; 
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #000;
        }

        h1 {
            font-family: 'Press Start 2P', 'Noto Sans TC', cursive;
            color: #FF007F; /* 螢光粉 */
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
            font-size: 32px;
            text-align: center;
        }

        /* 遊戲主要區塊 */
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        /* 畫布與面板區域 */
        .board-wrapper {
            background-color: #fff;
            border: 6px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            /* 確保外框能適應畫布大小 */
            max-width: 100%; 
        }

        canvas {
            border: 4px solid #000;
            background-color: #E8F8F5; /* 極淺的青色，視覺清爽 */
            display: block;
            margin: 0 auto;
            /* 確保在小螢幕上不會破版 */
            max-width: 100%;
            height: auto;
        }

        .score-board {
            font-family: 'Press Start 2P', monospace;
            font-size: 20px;
            margin: 10px 0 20px 0;
            color: #333;
        }

        /* 按鈕樣式 (復古粗獷風格) */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 900;
            font-size: 18px;
            padding: 10px 20px;
            border: 4px solid #000;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .btn-start {
            background-color: #00F0FF; /* 亮青色 */
            color: #000;
        }

        .btn-restart {
            background-color: #FF3366; /* 鮮豔紅粉 */
            color: #FFF;
        }

        /* 遊戲玩法說明面板 */
        .instructions {
            background-color: #B2FF59; /* 亮螢光綠 */
            border: 6px solid #000;
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            flex-shrink: 0;
        }

        .instructions h2 {
            font-family: 'Press Start 2P', 'Noto Sans TC', cursive;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 3px dashed #000;
            padding-bottom: 10px;
        }

        .instructions ul {
            list-style-type: none;
            line-height: 1.8;
            font-size: 16px;
            font-weight: bold;
        }

        .instructions li::before {
            content: "🎮 ";
        }

        /* 手機版響應式 */
        @media (max-width: 900px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            .instructions {
                width: 100%;
                max-width: 600px;
            }
        }
    </style>
</head>
<body>

    <h1>SNAKE GAME</h1>

    <div class="game-container">
        <div class="board-wrapper">
            <div class="score-board">
                SCORE: <span id="score">0</span>
            </div>
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            
            <div class="controls">
                <button class="btn-start" id="startBtn">開始遊戲</button>
                <button class="btn-restart" id="restartBtn" disabled>重新開始</button>
            </div>
        </div>

        <div class="instructions">
            <h2>遊戲玩法說明</h2>
            <ul>
                <li>點擊「開始遊戲」啟動。</li>
                <li>使用鍵盤的 <strong>上、下、左、右方向鍵</strong> 來控制蛇的移動方向。</li>
                <li>吃掉畫面上的亮粉色方塊（食物）可以獲得分數，同時蛇的身體會變長。</li>
                <li><strong>注意：</strong>如果蛇撞到牆壁，或是咬到自己的身體，遊戲就會結束！</li>
                <li>點擊「重新開始」再來一局。</li>
            </ul>
        </div>
    </div>

    <script>
        // 取得 DOM 元素
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");

        // 遊戲基本設定
        const gridSize = 20; // 每個格子的寬高保持不變
        const tileCountX = canvas.width / gridSize; // X軸有幾個格子 (30格)
        const tileCountY = canvas.height / gridSize; // Y軸有幾個格子 (30格)
        
        // 遊戲狀態變數
        let snake = [];
        let dx = 0;
        let dy = 0;
        let foodX;
        let foodY;
        let score = 0;
        let gameLoop;
        let isPlaying = false;
        let changingDirection = false;

        // 初始化遊戲狀態
        function initGame() {
            // 讓蛇的初始位置動態置中
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            dx = 1; // 初始向右移動
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            spawnFood();
        }

        // 開始遊戲
        function startGame() {
            if (isPlaying) return;
            initGame();
            isPlaying = true;
            startBtn.disabled = true;
            restartBtn.disabled = false;
            // 設定遊戲迴圈速度 (毫秒)
            gameLoop = setInterval(main, 120); 
        }

        // 重新開始
        function restartGame() {
            clearInterval(gameLoop);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            startGame();
        }

        // 遊戲主迴圈
        function main() {
            if (hasGameEnded()) {
                isPlaying = false;
                clearInterval(gameLoop);
                
                // 繪製 GAME OVER 文字
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FF007F";
                // 放大結束文字
                ctx.font = "40px 'Press Start 2P', sans-serif"; 
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                
                startBtn.disabled = false;
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            advanceSnake();
            drawSnake();
        }

        // 清除畫布
        function clearCanvas() {
            ctx.fillStyle = "#E8F8F5";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 畫蛇
        function drawSnake() {
            snake.forEach((part, index) => {
                // 蛇頭顏色不同
                ctx.fillStyle = index === 0 ? "#00BFFF" : "#00F0FF"; 
                ctx.strokeStyle = "#000"; // 黑色粗邊框加強復古感
                ctx.lineWidth = 2;
                
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        // 移動蛇
        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // 將新頭部加入陣列最前方

            // 檢查是否吃到食物
            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                spawnFood();
            } else {
                // 沒吃到食物就移除尾巴
                snake.pop();
            }
        }

        // 產生食物
        function spawnFood() {
            foodX = Math.floor(Math.random() * tileCountX);
            foodY = Math.floor(Math.random() * tileCountY);
            
            // 確保食物不會生在蛇的身上
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === foodX && part.y === foodY) {
                    spawnFood();
                }
            });
        }

        // 畫食物
        function drawFood() {
            ctx.fillStyle = "#FF007F"; // 螢光粉紅食物
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
            ctx.strokeRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        // 判斷遊戲是否結束
        function hasGameEnded() {
            // 撞到自己
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            // 撞到牆壁
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCountX;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCountY;

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        // 監聽方向鍵控制
        function changeDirection(event) {
            // 避免在同一幀內連續按鍵導致蛇頭反向咬到自己
            if (changingDirection) return;
            
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            
            // 防止方向鍵捲動整個視窗
            if([37, 38, 39, 40].indexOf(keyPressed) > -1) {
                event.preventDefault();
            }

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
                changingDirection = true;
            }
        }

        // 事件綁定
        document.addEventListener("keydown", changeDirection);
        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", restartGame);

        // 初始化畫面 (但不開始動作)
        clearCanvas();
        ctx.fillStyle = "#333";
        ctx.font = "20px 'Noto Sans TC', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("點擊「開始遊戲」", canvas.width / 2, canvas.height / 2);

    </script>
</body>
</html>
