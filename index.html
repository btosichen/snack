<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復古鮮豔貪食蛇 - 排行榜爭霸戰</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* 全局與重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #FFDE00; /* 亮黃色背景 */
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #000;
        }

        h1 {
            font-family: 'Press Start 2P', 'Noto Sans TC', cursive;
            color: #FF007F; /* 螢光粉 */
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
            font-size: 32px;
            text-align: center;
        }

        /* 遊戲與面板主要區塊 */
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        /* 畫布與面板區域 */
        .board-wrapper {
            background-color: #fff;
            border: 6px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            max-width: 100%; 
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            margin: 10px 0 20px 0;
            color: #333;
            padding: 0 10px;
        }

        canvas {
            border: 4px solid #000;
            background-color: #E8F8F5;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }

        /* 輸入框與按鈕 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
            font-size: 16px;
            padding: 10px;
            border: 4px solid #000;
            border-radius: 8px;
            width: 180px;
            text-align: center;
        }

        button {
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 900;
            font-size: 18px;
            padding: 10px 20px;
            border: 4px solid #000;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        button:disabled {
            background-color: #ccc !important;
            color: #666 !important;
            cursor: not-allowed;
            box-shadow: 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }

        .btn-start { background-color: #00F0FF; color: #000; }
        .btn-restart { background-color: #FF3366; color: #FFF; }

        /* 右側面板：說明與排行榜 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
            flex-shrink: 0;
        }

        .panel-box {
            border: 6px solid #000;
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
            border-radius: 10px;
        }

        .instructions { background-color: #B2FF59; /* 亮螢光綠 */ }
        .leaderboard { background-color: #FF9E00; /* 亮橘色 */ }

        .panel-box h2 {
            font-family: 'Press Start 2P', 'Noto Sans TC', cursive;
            font-size: 16px;
            margin-bottom: 15px;
            border-bottom: 3px dashed #000;
            padding-bottom: 10px;
            text-align: center;
        }

        .instructions ul {
            list-style-type: none;
            line-height: 1.8;
            font-size: 15px;
            font-weight: bold;
        }
        .instructions li::before { content: "🎮 "; }

        /* 排行榜表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-weight: bold;
            font-size: 14px;
            background-color: #FFF;
            border: 3px solid #000;
        }

        th, td {
            border: 2px solid #000;
            padding: 8px 4px;
            text-align: center;
        }

        th { background-color: #00F0FF; }
        tr:nth-child(even) { background-color: #FFF3E0; }

        .loading-text {
            text-align: center;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 900px) {
            .game-container { flex-direction: column; align-items: center; }
            .side-panel { width: 100%; max-width: 600px; }
        }
    </style>
</head>
<body>

    <h1>SNAKE GAME</h1>

    <div class="game-container">
        <div class="board-wrapper">
            <div class="status-bar">
                <span>TIME: <span id="timeDisplay">0</span>s</span>
                <span>SCORE: <span id="scoreDisplay">0</span></span>
            </div>
            
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            
            <div class="controls">
                <input type="text" id="playerName" placeholder="輸入暱稱 (必填)" maxlength="8">
                <button class="btn-start" id="startBtn">開始遊戲</button>
                <button class="btn-restart" id="restartBtn" disabled>重新開始</button>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-box instructions">
                <h2>遊戲玩法說明</h2>
                <ul>
                    <li>輸入暱稱後點擊「開始遊戲」。</li>
                    <li>使用 <strong>上、下、左、右</strong> 鍵控制方向。</li>
                    <li>吃掉亮粉色方塊得分，蛇身會變長。</li>
                    <li>撞牆或咬到自己即遊戲結束！</li>
                    <li>分數越高、花費時間越短，排名越前面！</li>
                </ul>
            </div>

            <div class="panel-box leaderboard">
                <h2>TOP 10 英雄榜</h2>
                <div id="leaderboardContent">
                    <p class="loading-text">讀取排行榜中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 請在這裡貼上你從 Google Apps Script 取得的網址
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxDE5Dny_ztcLIZsflO4d7mwFF-JSp21EIxszWKWg5DO5hU7zZ8UFO0aMFxhxvN3Vcp/exec"; 

        // 取得 DOM 元素
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const timeDisplay = document.getElementById("timeDisplay");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");
        const playerNameInput = document.getElementById("playerName");
        const leaderboardContent = document.getElementById("leaderboardContent");

        // 遊戲基本設定
        const gridSize = 20; 
        const tileCountX = canvas.width / gridSize; 
        const tileCountY = canvas.height / gridSize; 
        
        let snake = [];
        let dx = 0; let dy = 0;
        let foodX; let foodY;
        let score = 0;
        let gameLoop;
        let timerLoop;
        let isPlaying = false;
        let changingDirection = false;
        let playTimeSeconds = 0;

        // 網頁載入時先讀取一次排行榜
        loadLeaderboard();

        // 監聽暱稱輸入，確保有名字才能玩
        playerNameInput.addEventListener('input', () => {
            if (playerNameInput.value.trim() !== "" && !isPlaying) {
                startBtn.disabled = false;
            }
        });

        function initGame() {
            const startX = Math.floor(tileCountX / 2);
            const startY = Math.floor(tileCountY / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            dx = 1; dy = 0;
            score = 0;
            playTimeSeconds = 0;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = playTimeSeconds;
            spawnFood();
        }

        function startGame() {
            const nickname = playerNameInput.value.trim();
            if (nickname === "") {
                alert("請先輸入暱稱才能挑戰排行榜喔！");
                playerNameInput.focus();
                return;
            }
            if (isPlaying) return;
            
            initGame();
            isPlaying = true;
            startBtn.disabled = true;
            restartBtn.disabled = false;
            playerNameInput.disabled = true;

            gameLoop = setInterval(main, 120); 
            timerLoop = setInterval(() => {
                playTimeSeconds++;
                timeDisplay.innerText = playTimeSeconds;
            }, 1000);
        }

        function restartGame() {
            clearInterval(gameLoop);
            clearInterval(timerLoop);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            startGame();
        }

        function main() {
            if (hasGameEnded()) {
                isPlaying = false;
                clearInterval(gameLoop);
                clearInterval(timerLoop);
                
                // 畫出 GAME OVER
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FF007F";
                ctx.font = "40px 'Press Start 2P', sans-serif"; 
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                
                startBtn.disabled = true; 
                playerNameInput.disabled = false;

                // 儲存成績並更新排行榜
                saveScoreAndReload(playerNameInput.value.trim(), score, playTimeSeconds);
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            advanceSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#E8F8F5";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#00BFFF" : "#00F0FF"; 
                ctx.strokeStyle = "#000"; 
                ctx.lineWidth = 2;
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreDisplay.innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function spawnFood() {
            foodX = Math.floor(Math.random() * tileCountX);
            foodY = Math.floor(Math.random() * tileCountY);
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === foodX && part.y === foodY) spawnFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#FF007F"; 
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
            ctx.strokeRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCountX;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCountY;
            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
        }

        function changeDirection(event) {
            if (changingDirection) return;
            const LEFT_KEY = 37; const RIGHT_KEY = 39; const UP_KEY = 38; const DOWN_KEY = 40;
            const keyPressed = event.keyCode;
            
            if([37, 38, 39, 40].indexOf(keyPressed) > -1) event.preventDefault();

            const goingUp = dy === -1; const goingDown = dy === 1;
            const goingRight = dx === 1; const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; changingDirection = true; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; changingDirection = true; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; changingDirection = true; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; changingDirection = true; }
        }

        // ================= API 串接區塊 =================

        // 讀取排行榜
        function loadLeaderboard() {
            if (GAS_URL === "https://script.google.com/macros/s/AKfycbxDE5Dny_ztcLIZsflO4d7mwFF-JSp21EIxszWKWg5DO5hU7zZ8UFO0aMFxhxvN3Vcp/exec") return;

            fetch(`${GAS_URL}?action=read`)
                .then(response => response.json())
                .then(data => {
                    if(data.length === 0) {
                        leaderboardContent.innerHTML = "<p style='text-align:center;'>目前尚無紀錄，快來搶頭香！</p>";
                        return;
                    }
                    let tableHTML = `
                        <table>
                            <tr><th>排名</th><th>暱稱</th><th>分數</th><th>秒數</th></tr>
                    `;
                    data.forEach((row, index) => {
                        // 前三名加上皇冠 Emoji 裝飾
                        let rank = index + 1;
                        if(rank === 1) rank = "🥇";
                        else if(rank === 2) rank = "🥈";
                        else if(rank === 3) rank = "🥉";
                        
                        tableHTML += `<tr><td>${rank}</td><td>${row.nickname}</td><td>${row.score}</td><td>${row.playTime}</td></tr>`;
                    });
                    tableHTML += `</table>`;
                    leaderboardContent.innerHTML = tableHTML;
                })
                .catch(error => {
                    console.error("讀取失敗:", error);
                    leaderboardContent.innerHTML = "<p style='text-align:center; color:red;'>讀取排行榜失敗</p>";
                });
        }

        // 寫入成績並重新讀取
        function saveScoreAndReload(nickname, score, playTime) {
            if (GAS_URL === "https://script.google.com/macros/s/AKfycbxDE5Dny_ztcLIZsflO4d7mwFF-JSp21EIxszWKWg5DO5hU7zZ8UFO0aMFxhxvN3Vcp/exec") {
                alert("提醒：您尚未設定 Google Apps Script 網址，因此無法記錄成績！");
                return;
            }

            leaderboardContent.innerHTML = "<p class='loading-text'>成績上傳中...</p>";
            
            const url = `${GAS_URL}?action=save&nickname=${encodeURIComponent(nickname)}&score=${score}&playTime=${playTime}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        loadLeaderboard(); // 成功後自動重整榜單
                    }
                })
                .catch(error => {
                    console.error("儲存失敗:", error);
                    loadLeaderboard(); 
                });
        }

        // 事件綁定
        document.addEventListener("keydown", changeDirection);
        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", restartGame);

        // 初始化畫面
        clearCanvas();
        ctx.fillStyle = "#333";
        ctx.font = "20px 'Noto Sans TC', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("輸入暱稱後，點擊「開始遊戲」", canvas.width / 2, canvas.height / 2);

    </script>
</body>
</html>
